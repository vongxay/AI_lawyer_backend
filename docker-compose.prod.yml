version: "3.9"

# Production compose for single-host deployment
# Use: docker compose -f docker-compose.prod.yml up -d

services:
  # ── FastAPI Backend (Production) ────────────────────────────────────────────
  backend:
    build:
      context: .
      target: production
      cache_from:
        - type=local,src=.docker-cache
    image: ai-lawyer-backend:latest
    container_name: ai-lawyer-backend
    command: >
      gunicorn main:app
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --access-logfile -
      --error-logfile -
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env.prod              # Production secrets (git-ignored)
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Async Worker (ARQ) – Production ────────────────────────────────────────
  worker:
    build:
      context: .
      target: production
    image: ai-lawyer-backend:latest
    container_name: ai-lawyer-worker
    command: python -m arq workers.WorkerSettings
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env.prod
    depends_on:
      - redis
    restart: always
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis (Production) ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-lawyer-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only in production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
