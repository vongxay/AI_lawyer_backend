version: "3.9"

services:
  # ── FastAPI Backend (Development) ───────────────────────────────────────────
  backend:
    build:
      context: .
      target: dev              # Use dev stage with hot reload support
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    env_file:
      - .env                # Local secrets (git-ignored)
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app                         # Full app volume for hot reload
      - /app/__pycache__               # Exclude pycache
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Async Worker (ARQ) ───────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: dev
    command: python -m arq workers.WorkerSettings
    environment:
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped
    networks:
      - app-network

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes  # Enable AOF persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
