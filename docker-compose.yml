version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      target: deps         # Use deps stage for dev (has dev tools)
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    env_file:
      - .env                # Local secrets (git-ignored)
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend   # Hot reload in dev
    restart: unless-stopped

  # ── Async Worker (ARQ) ───────────────────────────────────────────────────────
  worker:
    build:
      context: .
      target: deps
    command: python -m arq backend.workers.WorkerSettings
    environment:
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
